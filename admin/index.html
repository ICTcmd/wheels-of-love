<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Wheels of Love</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="icon" href="../assets/images/bago-city-logo.png" type="image/png">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">&#128193;</div>
      <h1>Wheels of Love</h1>
      <p>Admin Panel � Bago City LGU</p>
    </div>
    <div class="login-error" id="loginError" role="alert"></div>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-input"
               placeholder="admin@bago.gov.ph" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div style="position:relative">
          <input type="password" id="password" name="password" class="form-input"
                 placeholder="��������" required autocomplete="current-password"
                 style="padding-right:44px">
          <button type="button" id="togglePw"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400);font-size:.9rem;cursor:pointer"
                  aria-label="Toggle password visibility">&#128193;</button>
        </div>
      </div>
      <button type="submit" class="btn-admin btn-admin-primary"
              style="width:100%;justify-content:center;padding:11px;font-size:.95rem;margin-top:8px">
        Sign In ?
      </button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:.82rem;color:var(--text-muted)">
      <a href="../index.html" style="color:var(--red-main)">? Back to Website</a>
    </p>
  </div>
</div>
<script src="../assets/js/admin.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('hw_admin_token')) window.location.href = '/admin/dashboard.html';

  // Toggle password visibility
  document.getElementById('togglePw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    this.textContent = pw.type === 'password' ? '??' : '??';
  });
</script>
</body>
</html>
